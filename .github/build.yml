name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Find gradlew and build
        run: |
          echo "=== All files ==="
          find . -name "gradlew"
          echo "=== Building ==="
          GRADLEW=$(find . -name "gradlew" -type f | head -1)
          chmod +x "$GRADLEW"
          DIR=$(dirname "$GRADLEW")
          cd "$DIR"
          ./gradlew assembleDebug

      - uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: "**/build/outputs/apk/debug/*.apk"
