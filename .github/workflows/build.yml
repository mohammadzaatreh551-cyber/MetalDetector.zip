name: Build APK

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Build with Gradle
        run: |
          # البحث عن المسار الذي يحتوي على ملف gradlew
          GRADLE_DIR=$(find . -name "gradlew" -exec dirname {} \;)
          echo "Found gradle in: $GRADLE_DIR"
          cd "$GRADLE_DIR"
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MetalDetector-APK
          # البحث عن ملف الـ apk في أي مجلد فرعي داخل المشروع
          path: **/app-debug.apk
