name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build APK
        run: |
          unzip MetalDetector.zip
          cd MetalDetector
          gradle wrapper --gradle-version 8.2
          chmod +x gradlew
          ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: MetalDetector-APK
          path: MetalDetector/app/build/outputs/apk/debug/app-debug.apk
